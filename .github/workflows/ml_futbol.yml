name: ML Fútbol Pipeline

on:
  schedule:
    - cron: '0 3 * * 0'  # Ejecuta cada domingo a las 3 AM UTC
  workflow_dispatch:      # Permite ejecutar manualmente

jobs:
  run-ml-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar extracción de datos
      run: python src/data_extraction.py

    - name: Ejecutar entrenamiento de modelo
      run: python src/model_training.py

    - name: Subir modelo entrenado como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: modelo-futbol
        path: modelo_espn_rf.pkl
